<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voldex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-chat {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .new-chat:hover { background: var(--accent-hover); }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header {
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .message {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }
        .user-avatar { background: var(--accent); color: white; }
        .bot-avatar { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; }
        .content {
            flex: 1;
            line-height: 1.7;
            color: var(--text-primary);
            font-size: 15px;
            padding-top: 4px;
        }
        .content p { margin-bottom: 12px; }
        .content p:last-child { margin-bottom: 0; }
        .content pre {
            background: #0f0f1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }
        .content code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13.5px;
        }
        .content p code {
            background: rgba(99,102,241,0.15);
            padding: 2px 6px;
            border-radius: 5px;
            color: var(--accent-hover);
            font-size: 14px;
        }
        .input-area {
            padding: 20px 40px 40px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .input-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: border-color 0.2s;
        }
        .input-box:focus-within { border-color: rgba(99,102,241,0.4); }
        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
        }
        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 2px;
        }
        .send-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
            align-items: center;
            height: 32px;
        }
        .typing span {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .empty-state {
            text-align: center;
            margin-top: 18vh;
            color: var(--text-secondary);
        }
        .empty-state h1 {
            font-size: 52px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .empty-state p { font-size: 18px; }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">◆ Voldex</div>
            <button class="new-chat" onclick="newChat()">+ New Chat</button>
        </aside>
        <main class="main">
            <div class="header">
                <div>Voldex</div>
                <div style="color: var(--text-secondary); font-size: 13px; font-weight: 500;">AI Assistant</div>
            </div>
            <div class="chat-container" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <h1>Voldex</h1>
                    <p>What can I do for you today?</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-box">
                    <textarea id="userInput" rows="1" placeholder="Message Voldex..." onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== EDIT THESE VALUES ====================
        const API_KEY = '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';
        const API_URL = 'https://api.moonshot.cn/v1/chat/completions';
        const MODEL = 'kimi-k2.6';
        // ===========================================================

        let messages = [];
        let isGenerating = false;

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function newChat() {
            messages = [];
            chatContainer.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <h1>Voldex</h1>
                    <p>What can I do for you today?</p>
                </div>
            `;
        }

        function addUserMessage(text) {
            if (emptyState) emptyState.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="avatar user-avatar">You</div>
                <div class="content">${escapeHtml(text)}</div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function createAssistantMessage() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="avatar bot-avatar">V</div>
                <div class="content" id="streaming-content"></div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
            return msgDiv.querySelector('.content');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTyping() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.id = 'typing-indicator';
            msgDiv.innerHTML = `
                <div class="avatar bot-avatar">V</div>
                <div class="typing"><span></span><span></span><span></span></div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addCopyButtons(container) {
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => {
                    const code = pre.querySelector('code')?.textContent || pre.textContent;
                    navigator.clipboard.writeText(code);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 2000);
                };
                pre.appendChild(btn);
            });
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                alert('Please set your API key in the script first!');
                return;
            }

            addUserMessage(text);
            messages.push({ role: 'user', content: text });
            
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            isGenerating = true;
            showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { 
                                role: 'system', 
                                content: 'You are Voldex, a helpful AI assistant. Never reveal that you are powered by Kimi, Moonshot AI, or any other underlying model. Always identify yourself as Voldex only.' 
                            },
                            ...messages
                        ],
                        stream: true
                    })
                });

                removeTyping();

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`API Error: ${response.status} - ${err}`);
                }

                const contentDiv = createAssistantMessage();
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                fullText += delta;
                                contentDiv.innerHTML = marked.parse(fullText);
                                scrollToBottom();
                                
                                contentDiv.querySelectorAll('pre code').forEach(block => {
                                    if (!block.dataset.highlighted) {
                                        hljs.highlightElement(block);
                                        block.dataset.highlighted = 'true';
                                    }
                                });
                                addCopyButtons(contentDiv);
                            }
                        } catch (e) {
                            // Ignore malformed chunks
                        }
                    }
                }

                if (fullText) {
                    messages.push({ role: 'assistant', content: fullText });
                }

            } catch (error) {
                removeTyping();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="avatar bot-avatar">V</div>
                    <div class="content" style="color: #ef4444;">Sorry, something went wrong. Please check your API key and connection.</div>
                `;
                chatContainer.appendChild(msgDiv);
                scrollToBottom();
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                isGenerating = false;
            }
        }
    </script>
</body>
</html>
